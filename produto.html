<style>
 *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;

}

/* HEADER */
header{
    background:#000000;
    color:#ffffff;
    text-align:center;
    padding:30px 20px;
}

nav{
    background:#2c2c2c;
    text-align:center;
    padding:15px;
}

nav a{
    color:rgb(255, 255, 255);
    text-decoration:none;
    margin:0 20px;
    font-weight:bold;
}

/* BANNER */
.banner{
    background:linear-gradient(to right,#7a7a7a,#555050);
    color:rgb(255, 255, 255);
    text-align:center;
    padding:50px 50px;
/* Caminho da imagem */
        background-image: url('fundo imperial.png');

        /* Faz a imagem cobrir toda a tela */
        background-size: cover;

        /* Centraliza a imagem */
        background-position: center;

        /* Não repete a imagem */
        background-repeat: no-repeat;

        /* Mantém a imagem fixa ao rolar a página */
        background-attachment: fixed;

        /* Cor de fundo caso a imagem não carregue */
        background-color: #ffffff;
    }
.banner h2{
    font-size:60px;
    margin-bottom:10px;
}
.banner p{
    font-size:30px;
    margin-bottom:10px;
}
/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;

}

h2{
    text-align:center;
    margin-bottom:40px;
    font-size:30px;
}

/* PRODUTOS */
.produtos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;

}

.produto{
    background:rgb(255, 255, 255);
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgb(0, 0, 0);
    text-align:center;
}

.produto h3{
    margin:15px 0 10px;
}

.preco{
    color:#27ae60;
    font-weight:bold;
    font-size:18px;
    margin-bottom:15px;
}

.botao{
    display:inline-block;
    padding:10px 20px;
    background:black;
    color:rgb(255, 255, 255);
    text-decoration:none;
    border-radius:5px;
}

/* SOBRE */
.sobre{
    background:rgb(255, 255, 255);
    border-radius:10px;
    padding:30px;
    box-shadow:0 5px 15px rgb(0, 0, 0);
}

/* CONTATO */
.contato{
    background:rgb(82, 82, 82);
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgb(0, 0, 0);
    
}

/* FOOTER */
footer{
    background:rgb(73, 73, 73);
    color:rgb(255, 250, 250);
    text-align:center;
    padding:25px;
    margin-top:50px;
}
/*tempo da letra aparecer*/
@media(max-width:600px){
    nav a{
        display:block;
        margin:10px 0;
    }
}
h1 {
      animation: aparecer 1.0s ease forwards;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(10);
      }
    }
   /*para letra brinha*/
    h1 {
  color: #ffffff;
  text-shadow:
    0 0 10px #000000,
    0 0 20px #000000,
    0 0 40px #ffffff,
    0 0 80px #ffffff;
}

/* Variação com cor rosa */
.neon-pink {
  color: #ff0000;
  text-shadow:
    0 0 10px #000000,
    0 0 30px #000000,
    0 0 60px #ffffff;
}
/*image Todas*/   body {
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: inherit;
        padding: 50px;
    }

    .img-container {
        display: inline-block;
        overflow: hidden; /* Evita que a imagem ultrapasse o container */
        border-radius: 10px;
        box-shadow: 0 6px 16px rgb(255, 255, 255);
        transition: transform 0.3s ease;
    }

    .img-container img {
        width: 200px;
        height: 200;
        transition: transform 0.5s ease, filter 0.5s ease;
    }

/* Efeito ao passar o mouse */
.img-container:hover img {
 transform: scale(1.1); /* Zoom */
filter: brightness(1.2) contrast(1.1) saturate(1.3); /* Ajuste de cor */}
